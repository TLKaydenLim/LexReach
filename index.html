<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexReach AI — Law Firm Business Development</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia',serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
input,select,textarea,button{font-family:inherit}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
:root{
  --navy:#0b1f3a;--gold:#b8832a;--gold2:#d4a04a;
  --surf:#fff;--surf2:#f8f6f1;--bord:#e0dcd4;
  --tx:#1a1a1a;--mut:#7a7060;--acc:#1a4f8a;
}
@media(prefers-color-scheme:dark){
  body{background:#181c28}
  :root{--surf:#1c2130;--surf2:#232838;--bord:#2e3448;--tx:#e6e2da;--mut:#8890a8;--navy:#0d1826}
}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback} = React;
const R='10px';

const COUNTRIES=[
  {code:'SG',name:'Singapore',flag:'🇸🇬',cities:['Singapore']},
  {code:'GB',name:'United Kingdom',flag:'🇬🇧',cities:['London','Manchester','Birmingham','Edinburgh','Leeds','Bristol','Glasgow']},
  {code:'US',name:'United States',flag:'🇺🇸',cities:['New York','Los Angeles','Chicago','Houston','Washington DC','Boston','San Francisco','Miami','Atlanta','Dallas']},
  {code:'AU',name:'Australia',flag:'🇦🇺',cities:['Sydney','Melbourne','Brisbane','Perth','Adelaide']},
  {code:'HK',name:'Hong Kong',flag:'🇭🇰',cities:['Central','Admiralty','Wan Chai','Causeway Bay']},
  {code:'MY',name:'Malaysia',flag:'🇲🇾',cities:['Kuala Lumpur','Penang','Johor Bahru']},
  {code:'AE',name:'UAE',flag:'🇦🇪',cities:['Dubai','Abu Dhabi','Sharjah']},
  {code:'CA',name:'Canada',flag:'🇨🇦',cities:['Toronto','Vancouver','Montreal','Calgary','Ottawa']},
  {code:'IN',name:'India',flag:'🇮🇳',cities:['Mumbai','Delhi','Bangalore','Chennai','Hyderabad']},
  {code:'DE',name:'Germany',flag:'🇩🇪',cities:['Frankfurt','Munich','Berlin','Hamburg','Düsseldorf']},
  {code:'JP',name:'Japan',flag:'🇯🇵',cities:['Tokyo','Osaka','Nagoya']},
  {code:'FR',name:'France',flag:'🇫🇷',cities:['Paris','Lyon','Marseille']},
  {code:'NL',name:'Netherlands',flag:'🇳🇱',cities:['Amsterdam','Rotterdam','The Hague']},
  {code:'CH',name:'Switzerland',flag:'🇨🇭',cities:['Zurich','Geneva','Basel']},
  {code:'SG',name:'Singapore',flag:'🇸🇬',cities:['Singapore']},
];

const PRACTICE_AREAS=[
  'All Practice Areas','Corporate & M&A','Litigation & Dispute Resolution',
  'Employment & Labour','Intellectual Property','Real Estate','Banking & Finance',
  'Tax','Restructuring & Insolvency','Arbitration','Competition & Antitrust',
  'Data Privacy & Cybersecurity','Projects & Infrastructure','Insurance',
];

const STATUS_META={
  'Not contacted':{bg:'#f1f0ec',tx:'#6b6860',bord:'#d4d1c7',icon:'ti-circle'},
  'Email sent':{bg:'#e3f0fb',tx:'#1a5fb4',bord:'#b5d4f4',icon:'ti-send'},
  'Replied':{bg:'#eaf3de',tx:'#3b6d11',bord:'#c0dd97',icon:'ti-message-dots'},
  'Follow-up needed':{bg:'#faeeda',tx:'#854f0b',bord:'#fac775',icon:'ti-bell'},
  'Meeting booked':{bg:'#eeedfe',tx:'#3c3489',bord:'#afa9ec',icon:'ti-calendar-check'},
  'Not interested':{bg:'#fcebeb',tx:'#791f1f',bord:'#f7c1c1',icon:'ti-x'},
};

const DEFAULT_TEMPLATE=`Dear {partner},

I hope this message finds you well. My name is {senderName}, {senderTitle} at {senderCompany} — a specialist legal recruitment firm with deep expertise placing top-tier legal talent across {city} and the wider {country} market.

We work exclusively with law firms to identify and place qualified associates, senior associates, and partners across all practice areas. Our approach is discreet, thorough, and tailored to each firm's culture and requirements.

Given {firm}'s strong reputation in {practiceArea}, I believe we may be well-positioned to support your talent acquisition needs — whether for immediate vacancies or to build a long-term hiring pipeline.

I would welcome the opportunity to speak briefly about how we might add value. Would you be open to a short introductory call at your convenience?

Warm regards,
{senderName}
{senderTitle} | {senderCompany}
{senderEmail} | {senderPhone}`;

function fillTemplate(tpl,data){
  return tpl
    .replace(/{partner}/g,data.partner||'')
    .replace(/{firm}/g,data.firm||'')
    .replace(/{practiceArea}/g,data.practiceArea||'')
    .replace(/{city}/g,data.city||'')
    .replace(/{country}/g,data.country||'')
    .replace(/{senderName}/g,data.senderName||'[Your Name]')
    .replace(/{senderTitle}/g,data.senderTitle||'[Your Title]')
    .replace(/{senderCompany}/g,data.senderCompany||'[Your Company]')
    .replace(/{senderEmail}/g,data.senderEmail||'[Your Email]')
    .replace(/{senderPhone}/g,data.senderPhone||'[Your Phone]');
}

async function callClaude(system,user,key){
  if(!key) throw new Error('No API key. Click the ⚙ Settings button to enter your Anthropic key.');
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system,messages:[{role:'user',content:user}]})
  });
  const d=await res.json();
  if(!res.ok) throw new Error(d.error?.message||'API error '+res.status);
  return d.content.map(b=>b.text||'').join('');
}

async function searchFirms(country,city,practice,count,key){
  const sys='You are a legal industry database. Return ONLY a valid JSON array — no markdown, no code fences, no explanation. Each item: {"firm":"","partner":"","title":"","email":"","website":"","practiceArea":"","size":"","description":""}. Size must be one of: Boutique, Mid-size, Large, Magic Circle, Silver Circle. Use realistic names for the region and plausible email formats (firstname.lastname@firmslug.com).';
  const usr='Generate '+count+' law firms in '+city+', '+country+'. Practice: '+(practice==='All Practice Areas'?'mixed — corporate, litigation, employment, IP, banking':practice)+'. JSON array only.';
  const raw=await callClaude(sys,usr,key);
  const arr=JSON.parse(raw.replace(/```json|```/g,'').trim());
  return arr.map((f,i)=>({
    id:country+'-'+city+'-'+Date.now()+'-'+i,
    firm:f.firm||'',partner:f.partner||'',title:f.title||'Managing Partner',
    email:f.email||'',website:f.website||'',
    practiceArea:f.practiceArea||practice,size:f.size||'Mid-size',description:f.description||'',
    city,country,status:'Not contacted',notes:'',emailSentDate:null,selected:false,
  }));
}

async function getInsights(firm,company,key){
  const sys='You are a legal BD expert. Return ONLY valid JSON (no markdown): {"keyStrengths":[],"recruitmentOpportunity":"","suggestedSubjectLine":"","talkingPoints":[]}';
  const usr='Firm: '+firm.firm+', '+firm.city+', '+firm.country+'. Practice: '+firm.practiceArea+'. Size: '+firm.size+'. '+(firm.description||'')+'. Recruiter company: '+(company||'specialist legal recruiter')+'.';
  const raw=await callClaude(sys,usr,key);
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

async function personaliseEmail(firm,tpl,sender,key){
  const sys='You are an expert legal BD writer. Personalise the email for the specific firm. Keep it professional and ~220 words. Return ONLY the email body text.';
  const base=fillTemplate(tpl,{...firm,senderName:sender.name,senderTitle:sender.title,senderCompany:sender.company,senderEmail:sender.email,senderPhone:sender.phone});
  const usr='Template:\n'+base+'\n\nFirm: '+firm.firm+', '+firm.practiceArea+' specialist, '+firm.size+' in '+firm.city+'. Partner: '+firm.partner+'. '+(firm.description||'')+'\n\nPersonalise subtly — keep structure, tailor language. Return email body only.';
  return callClaude(sys,usr,key);
}

function exportCSV(rows){
  const h=['Firm','Partner','Title','Email','Website','City','Country','Practice','Size','Status','Sent Date','Notes'];
  const r=rows.map(f=>[f.firm,f.partner,f.title,f.email,f.website||'',f.city,f.country,f.practiceArea,f.size,f.status,f.emailSentDate||'',(f.notes||'').replace(/,/g,';')].map(v=>'"'+(v||'').replace(/"/g,'""')+'"').join(','));
  const csv=[h.join(','),...r].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='lexreach-'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

function Avatar({name,size=36}){
  const letters=(name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const colors=['#0b2a4a','#1a4f8a','#2c6e35','#7a4a0a','#4a2a7a','#0f6e56','#8a2020'];
  return React.createElement('div',{style:{width:size,height:size,borderRadius:'50%',background:colors[(name||'').charCodeAt(0)%colors.length],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:size*.35,fontWeight:600,flexShrink:0,fontFamily:'sans-serif'}},letters);
}

function Badge({status}){
  const m=STATUS_META[status]||STATUS_META['Not contacted'];
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,fontWeight:500,padding:'3px 9px',borderRadius:20,background:m.bg,color:m.tx,border:'0.5px solid '+m.bord,whiteSpace:'nowrap',fontFamily:'sans-serif'}}>
      <i className={'ti '+m.icon} style={{fontSize:11}}></i>{status}
    </span>
  );
}

function Toast({msg,type,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t)},[]);
  return (
    <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,background:type==='err'?'#8a2020':type==='warn'?'#7a4a0a':'#0b2a4a',color:'#fff',padding:'10px 18px',borderRadius:8,fontSize:13,display:'flex',alignItems:'center',gap:8,fontFamily:'sans-serif',boxShadow:'0 4px 16px rgba(0,0,0,.25)'}}>
      <i className={'ti '+(type==='err'?'ti-alert-triangle':type==='warn'?'ti-bell':'ti-check')} style={{fontSize:15}}></i>{msg}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState('search');
  const [params,setParams]=useState({country:'SG',city:'Singapore',practiceArea:'All Practice Areas',count:8});
  const [firms,setFirms]=useState([]);
  const [loading,setLoading]=useState(false);
  const [loadMsg,setLoadMsg]=useState('');
  const [sender,setSender]=useState({name:'',title:'',company:'',email:'',phone:''});
  const [template,setTemplate]=useState(DEFAULT_TEMPLATE);
  const [tracker,setTracker]=useState([]);
  const [toast,setToast]=useState(null);
  const [previewModal,setPreviewModal]=useState(null);
  const [previewBody,setPreviewBody]=useState('');
  const [previewLoading,setPreviewLoading]=useState(false);
  const [enrichModal,setEnrichModal]=useState(null);
  const [enrichData,setEnrichData]=useState(null);
  const [enrichLoading,setEnrichLoading]=useState(false);
  const [notesModal,setNotesModal]=useState(null);
  const [filterStatus,setFilterStatus]=useState('All');
  const [searchQ,setSearchQ]=useState('');
  const [showSettings,setShowSettings]=useState(false);
  const [apiKeyInput,setApiKeyInput]=useState(()=>{try{return localStorage.getItem('lr_api_key')||''}catch(e){return ''}});
  const [sendingAll,setSendingAll]=useState(false);

  const toast2=(msg,type='ok')=>setToast({msg,type});
  const apiKey=apiKeyInput;
  const countryObj=COUNTRIES.find(c=>c.code===params.country)||COUNTRIES[0];

  const saveKey=()=>{
    try{localStorage.setItem('lr_api_key',apiKeyInput)}catch(e){}
    toast2('API key saved');setShowSettings(false);
  };

  const doSearch=async()=>{
    if(!apiKey){toast2('Enter your Anthropic API key in Settings','err');setShowSettings(true);return;}
    setLoading(true);setLoadMsg('Claude is researching law firms...');
    try{
      const results=await searchFirms(countryObj.name,params.city,params.practiceArea,params.count,apiKey);
      setFirms(results);setTab('results');
      toast2('Found '+results.length+' firms');
    }catch(e){toast2(e.message,'err');}
    finally{setLoading(false);setLoadMsg('');}
  };

  const toggleSelect=id=>setFirms(p=>p.map(f=>f.id===id?{...f,selected:!f.selected}:f));
  const toggleAll=()=>{const any=firms.some(f=>f.selected);setFirms(p=>p.map(f=>({...f,selected:!any})));};
  const selected=firms.filter(f=>f.selected);

  const openPreview=async(firm)=>{
    setPreviewModal(firm);setPreviewLoading(true);setPreviewBody('');
    try{
      const body=await personaliseEmail(firm,template,sender,apiKey);
      setPreviewBody(body);
    }catch(e){
      setPreviewBody(fillTemplate(template,{...firm,senderName:sender.name,senderTitle:sender.title,senderCompany:sender.company,senderEmail:sender.email,senderPhone:sender.phone}));
    }
    setPreviewLoading(false);
  };

  const openEnrich=async(firm)=>{
    setEnrichModal(firm);setEnrichData(null);setEnrichLoading(true);
    try{setEnrichData(await getInsights(firm,sender.company,apiKey));}
    catch(e){setEnrichData({keyStrengths:['Error: '+e.message],recruitmentOpportunity:'Could not load.',suggestedSubjectLine:'',talkingPoints:[]});}
    setEnrichLoading(false);
  };

  const markSent=useCallback((ids)=>{
    const now=new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    setFirms(p=>p.map(f=>ids.includes(f.id)?{...f,status:'Email sent',emailSentDate:now,selected:false}:f));
    const entries=firms.filter(f=>ids.includes(f.id)).map(f=>({...f,status:'Email sent',emailSentDate:now}));
    setTracker(p=>{
      const upd=p.map(e=>entries.find(n=>n.id===e.id)||e);
      const fresh=entries.filter(n=>!p.find(e=>e.id===n.id));
      return [...upd,...fresh];
    });
    toast2(entries.length+' email'+(entries.length!==1?'s':'')+' marked as sent');
    setTab('tracker');
  },[firms]);

  const sendAll=async()=>{
    setSendingAll(true);
    await new Promise(r=>setTimeout(r,400));
    markSent(selected.map(f=>f.id));
    setSendingAll(false);
  };

  const updateField=(id,field,val)=>{
    setTracker(p=>p.map(e=>e.id===id?{...e,[field]:val}:e));
    setFirms(p=>p.map(f=>f.id===id?{...f,[field]:val}:f));
  };

  const filteredTracker=tracker.filter(f=>{
    const ms=filterStatus==='All'||f.status===filterStatus;
    const mq=!searchQ||[f.firm,f.partner,f.email,f.city].some(v=>(v||'').toLowerCase().includes(searchQ.toLowerCase()));
    return ms&&mq;
  });

  const stats={
    total:tracker.length,
    sent:tracker.filter(f=>f.status==='Email sent').length,
    replied:tracker.filter(f=>f.status==='Replied').length,
    meetings:tracker.filter(f=>f.status==='Meeting booked').length,
    pipeline:tracker.length?Math.round(tracker.filter(f=>['Replied','Follow-up needed','Meeting booked'].includes(f.status)).length/tracker.length*100):0,
  };

  const NAV=[['search','ti-telescope','Search'],['results','ti-list-details','Firms'],['compose','ti-mail-forward','Compose'],['tracker','ti-layout-dashboard','Tracker']];

  return (
    <div style={{minHeight:'100vh',background:'var(--surf2)'}}>
      {/* HEADER */}
      <div style={{background:'var(--navy)',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:8,background:'var(--gold)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <i className="ti ti-scale" style={{color:'#fff',fontSize:19}}></i>
          </div>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:15,fontFamily:'Georgia,serif'}}>LexReach <span style={{color:'var(--gold2)',fontStyle:'italic',fontSize:13,fontWeight:400}}>AI</span></div>
            <div style={{color:'rgba(255,255,255,0.4)',fontSize:10,fontFamily:'sans-serif'}}>Legal Recruitment Business Development</div>
          </div>
        </div>
        <div style={{display:'flex',gap:2,alignItems:'center'}}>
          {NAV.map(([v,ic,lb])=>(
            <button key={v} onClick={()=>setTab(v)} style={{background:tab===v?'rgba(255,255,255,0.14)':'transparent',border:'none',color:tab===v?'#fff':'rgba(255,255,255,0.5)',padding:'6px 12px',borderRadius:6,cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',gap:5,fontFamily:'sans-serif'}}>
              <i className={'ti '+ic} style={{fontSize:15}}></i>{lb}
            </button>
          ))}
          <div style={{width:1,background:'rgba(255,255,255,0.15)',height:20,margin:'0 4px'}}></div>
          {tracker.length>0&&(
            <button onClick={()=>exportCSV(tracker)} style={{background:'rgba(184,131,42,0.2)',border:'0.5px solid rgba(212,160,74,0.35)',color:'#d4a04a',padding:'6px 11px',borderRadius:6,cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',gap:4,fontFamily:'sans-serif'}}>
              <i className="ti ti-download" style={{fontSize:13}}></i>CSV
            </button>
          )}
          <button onClick={()=>setShowSettings(true)} style={{background:apiKey?'transparent':'rgba(200,80,80,0.2)',border:apiKey?'none':'0.5px solid rgba(200,80,80,0.4)',color:apiKey?'rgba(255,255,255,0.5)':'#ff9999',padding:'6px 10px',borderRadius:6,cursor:'pointer',fontFamily:'sans-serif',display:'flex',alignItems:'center',gap:4,fontSize:12}}>
            <i className="ti ti-settings" style={{fontSize:15}}></i>{!apiKey&&<span style={{fontSize:11}}>Set API key</span>}
          </button>
        </div>
      </div>

      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}

      <div style={{maxWidth:960,margin:'0 auto',padding:'22px 16px'}}>

        {/* ── SEARCH ── */}
        {tab==='search'&&(
          <div className="fade-in">
            <div style={{textAlign:'center',marginBottom:28}}>
              <div style={{fontSize:26,fontWeight:700,fontFamily:'Georgia,serif',marginBottom:6}}>Find law firm contacts</div>
              <div style={{fontSize:14,color:'var(--mut)',fontFamily:'sans-serif',marginBottom:10}}>Claude AI generates realistic law firm profiles with managing partner contacts</div>
              {!apiKey&&(
                <div onClick={()=>setShowSettings(true)} style={{display:'inline-flex',alignItems:'center',gap:7,padding:'7px 14px',borderRadius:8,background:'#fcebeb',border:'0.5px solid #f7c1c1',cursor:'pointer'}}>
                  <i className="ti ti-alert-triangle" style={{fontSize:14,color:'#8a2020'}}></i>
                  <span style={{fontSize:12,color:'#8a2020',fontFamily:'sans-serif'}}>API key required — click to enter your Anthropic key</span>
                </div>
              )}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,maxWidth:720,margin:'0 auto'}}>
              {/* Search params */}
              <div style={{background:'var(--surf)',borderRadius:R,border:'0.5px solid var(--bord)',padding:24,gridColumn:'1/-1'}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--mut)',marginBottom:14,fontFamily:'sans-serif',letterSpacing:'.5px'}}>SEARCH PARAMETERS</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  {[['Country',
                    <select value={params.country} onChange={e=>{const c=COUNTRIES.find(x=>x.code===e.target.value);setParams(p=>({...p,country:e.target.value,city:c?.cities[0]||''}))}} style={{width:'100%',padding:'9px 10px',borderRadius:7,border:'0.5px solid var(--bord)',fontSize:13,background:'var(--surf)',color:'var(--tx)',fontFamily:'sans-serif'}}>
                      {COUNTRIES.filter((c,i,a)=>a.findIndex(x=>x.code===c.code)===i).map(c=><option key={c.code} value={c.code}>{c.flag} {c.name}</option>)}
                    </select>
                  ],['City',
                    <select value={params.city} onChange={e=>setParams(p=>({...p,city:e.target.value}))} style={{width:'100%',padding:'9px 10px',borderRadius:7,border:'0.5px solid var(--bord)',fontSize:13,background:'var(--surf)',color:'var(--tx)',fontFamily:'sans-serif'}}>
                      {(COUNTRIES.find(c=>c.code===params.country)?.cities||[]).map(c=><option key={c}>{c}</option>)}
                    </select>
                  ],['Practice Area',
                    <select value={params.practiceArea} onChange={e=>setParams(p=>({...p,practiceArea:e.target.value}))} style={{width:'100%',padding:'9px 10px',borderRadius:7,border:'0.5px solid var(--bord)',fontSize:13,background:'var(--surf)',color:'var(--tx)',fontFamily:'sans-serif'}}>
                      {PRACTICE_AREAS.map(p=><option key={p}>{p}</option>)}
                    </select>
                  ],['Number of Firms',
                    <select value={params.count} onChange={e=>setParams(p=>({...p,count:+e.target.value}))} style={{width:'100%',padding:'9px 10px',borderRadius:7,border:'0.5px solid var(--bord)',fontSize:13,background:'var(--surf)',color:'var(--tx)',fontFamily:'sans-serif'}}>
                      {[5,8,10,12,15,20].map(n=><option key={n} value={n}>{n} firms</option>)}
                    </select>
                  ]].map(([label,ctrl])=>(
                    <div key={label}>
                      <label style={{display:'block',fontSize:12,color:'var(--mut)',marginBottom:5,fontFamily:'sans-serif'}}>{label}</label>
                      {ctrl}
                    </div>
                  ))}
                </div>
                <button onClick={doSearch} disabled={loading} style={{marginTop:16,width:'100%',padding:'12px',background:'var(--navy)',color:'#fff',border:'none',borderRadius:8,fontSize:14,fontWeight:500,cursor:loading?'not-allowed':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontFamily:'sans-serif',opacity:loading?.65:1}}>
                  {loading?(<><i className="ti ti-loader-2 spin" style={{fontSize:16}}></i>{loadMsg}</>):(<><i className="ti ti-sparkles" style={{fontSize:16}}></i>Search with Claude AI</>)}
                </button>
              </div>
              {/* Sender details */}

                <div style={{textAlign:'center',padding:'40px 0',color:'var(--mut)'}}>
                  <i className="ti ti-loader-2 spin" style={{fontSize:28,display:'block',marginBottom:10,color:'var(--gold)'}}></i>
                  <div style={{fontSize:13,fontFamily:'sans-serif'}}>Generating insights...</div>
                </div>
              ):enrichData&&(
                <div style={{display:'flex',flexDirection:'column',gap:14}}>
                  <div style={{background:'var(--surf2)',borderRadius:8,padding:'12px 14px'}}>
                    <div style={{fontSize:11,fontWeight:600,color:'var(--mut)',marginBottom:7,fontFamily:'sans-serif',letterSpacing:'.4px'}}>RECRUITMENT OPPORTUNITY</div>
                    <div style={{fontSize:13,fontFamily:'Georgia,serif',lineHeight:1.75,fontStyle:'italic'}}>{enrichData.recruitmentOpportunity}</div>
                  </div>
                  {enrichData.suggestedSubjectLine&&(
                    <div style={{background:'#eaf3de',borderRadius:8,padding:'10px 14px',border:'0.5px solid #c0dd97'}}>
                      <div style={{fontSize:10,fontWeight:600,color:'#3b6d11',marginBottom:4,fontFamily:'sans-serif',letterSpacing:'.4px'}}>SUGGESTED SUBJECT LINE</div>
                      <div style={{fontSize:13,fontFamily:'sans-serif',color:'#2c6e35',fontWeight:500}}>{enrichData.suggestedSubjectLine}</div>
                    </div>
                  )}
                  {enrichData.keyStrengths&&enrichData.keyStrengths.length>0&&(
                    <div>
                      <div style={{fontSize:11,fontWeight:600,color:'var(--mut)',marginBottom:8,fontFamily:'sans-serif',letterSpacing:'.4px'}}>FIRM STRENGTHS</div>
                      <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {enrichData.keyStrengths.map((s,i)=><span key={i} style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:'#e3f0fb',color:'#1a4f8a',border:'0.5px solid #b5d4f4',fontFamily:'sans-serif'}}>{s}</span>)}
                      </div>
                    </div>
                  )}
                  {enrichData.talkingPoints&&enrichData.talkingPoints.length>0&&(
                    <div>
                      <div style={{fontSize:11,fontWeight:600,color:'var(--mut)',marginBottom:8,fontFamily:'sans-serif',letterSpacing:'.4px'}}>TALKING POINTS</div>
                      <div style={{display:'flex',flexDirection:'column',gap:7}}>
                        {enrichData.talkingPoints.map((p,i)=>(
                          <div key={i} style={{display:'flex',gap:10,padding:'8px 10px',background:'var(--surf2)',borderRadius:7,alignItems:'flex-start'}}>
                            <span style={{fontSize:12,color:'var(--gold)',fontFamily:'sans-serif',fontWeight:600,flexShrink:0}}>{i+1}.</span>
                            <span style={{fontSize:12,fontFamily:'Georgia,serif',lineHeight:1.6}}>{p}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
            <div style={{padding:'10px 20px',borderTop:'0.5px solid var(--bord)',display:'flex',justifyContent:'flex-end'}}>
              <button onClick={()=>setEnrichModal(null)} style={{padding:'7px 14px',borderRadius:7,border:'0.5px solid var(--bord)',background:'transparent',cursor:'pointer',fontSize:12,fontFamily:'sans-serif',color:'var(--tx)'}}>Close</button>
            </div>
          </div>
        </div>
      )}

      {/* ── NOTES MODAL ── */}
      {notesModal&&(
        <div onClick={()=>setNotesModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}}>
          <div onClick={e=>e.stopPropagation()} style={{background:'var(--surf)',borderRadius:R,maxWidth:440,width:'100%'}}>
            <div style={{padding:'16px 20px',borderBottom:'0.5px solid var(--bord)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontWeight:700,fontSize:14,fontFamily:'Georgia,serif'}}>Notes — {notesModal.firm}</div>
              <button onClick={()=>setNotesModal(null)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:22,color:'var(--mut)'}}>×</button>
            </div>
            <div style={{padding:'16px 20px'}}>
              <textarea id="notesTxt" defaultValue={notesModal.notes} placeholder="Record conversation details, follow-up actions, contact notes..." style={{width:'100%',height:150,padding:'10px',borderRadius:7,border:'0.5px solid var(--bord)',fontSize:12,lineHeight:1.65,resize:'vertical',fontFamily:'Georgia,serif',background:'var(--surf)',color:'var(--tx)'}} />
            </div>
            <div style={{padding:'10px 20px',borderTop:'0.5px solid var(--bord)',display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={()=>setNotesModal(null)} style={{padding:'7px 12px',borderRadius:7,border:'0.5px solid var(--bord)',background:'transparent',cursor:'pointer',fontSize:12,fontFamily:'sans-serif',color:'var(--tx)'}}>Cancel</button>
              <button onClick={()=>{updateField(notesModal.id,'notes',document.getElementById('notesTxt').value);setNotesModal(null);toast2('Notes saved');}} style={{padding:'7px 14px',borderRadius:7,border:'none',background:'var(--navy)',color:'#fff',cursor:'pointer',fontSize:12,fontWeight:500,fontFamily:'sans-serif'}}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
