<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexReach — Law Firm Business Development</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia',serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh}
input,select,textarea,button{font-family:inherit}
:root{
  --navy:#0b1f3a;--gold:#b8832a;--gold2:#d4a04a;
  --surf:#fff;--surf2:#f8f6f1;--bord:#e0dcd4;
  --tx:#1a1a1a;--mut:#7a7060;--acc:#1a4f8a;
}

  body{background:#181c28}
  :root{--surf:#1c2130;--surf2:#232838;--bord:#2e3448;--tx:#e6e2da;--mut:#8890a8;--navy:#0d1826}
}

@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.spin{animation:spin .85s linear infinite}
.pulse{animation:pulse 1.5s ease infinite}
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useCallback, useEffect} = React;
const R = '10px';

/* ─── CONSTANTS ─────────────────────────────────────── */
const COUNTRIES = [
  {code:'SG',name:'Singapore',      flag:'🇸🇬',cities:['Singapore']},
  {code:'GB',name:'United Kingdom', flag:'🇬🇧',cities:['London','Manchester','Birmingham','Edinburgh','Leeds','Bristol','Glasgow']},
  {code:'US',name:'United States',  flag:'🇺🇸',cities:['New York','Los Angeles','Chicago','Houston','Washington DC','Boston','San Francisco','Miami','Atlanta','Dallas']},
  {code:'AU',name:'Australia',      flag:'🇦🇺',cities:['Sydney','Melbourne','Brisbane','Perth','Adelaide']},
  {code:'CN',name:'China',          flag:'CN',cities:['Beijing','Shanghai']},
  {code:'HK',name:'Hong Kong',      flag:'🇭🇰',cities:['Hong Kong']},
  {code:'MY',name:'Malaysia',       flag:'🇲🇾',cities:['Kuala Lumpur','Penang','Johor Bahru']},
  {code:'AE',name:'UAE',            flag:'🇦🇪',cities:['Dubai','Abu Dhabi']},
  {code:'CA',name:'Canada',         flag:'🇨🇦',cities:['Toronto','Vancouver','Montreal','Calgary']},
  {code:'IN',name:'India',          flag:'🇮🇳',cities:['Mumbai','Delhi','Bangalore','Chennai']},
  {code:'DE',name:'Germany',        flag:'🇩🇪',cities:['Frankfurt','Munich','Berlin','Hamburg']},
  {code:'JP',name:'Japan',          flag:'🇯🇵',cities:['Tokyo','Osaka']},
  {code:'FR',name:'France',         flag:'🇫🇷',cities:['Paris','Lyon']},
  {code:'NL',name:'Netherlands',    flag:'🇳🇱',cities:['Amsterdam','Rotterdam']},
  {code:'CH',name:'Switzerland',    flag:'🇨🇭',cities:['Zurich','Geneva']},
  {code:'ZA',name:'South Africa',   flag:'🇿🇦',cities:['Johannesburg','Cape Town','Durban']},
];

const PRACTICE_AREAS = [
  'All Practice Areas','Corporate & M&A','Litigation & Dispute Resolution',
  'Employment & Labour','Intellectual Property','Real Estate','Banking & Finance',
  'Tax','Restructuring & Insolvency','Arbitration','Competition & Antitrust',
  'Data Privacy & Cybersecurity','Projects & Infrastructure','Insurance',
];

const STATUS_META = {
  'Not contacted':    {bg:'#f1f0ec',tx:'#6b6860',bord:'#d4d1c7',icon:'ti-circle'},
  'Email sent':       {bg:'#e3f0fb',tx:'#1a5fb4',bord:'#b5d4f4',icon:'ti-send'},
  'Replied':          {bg:'#eaf3de',tx:'#3b6d11',bord:'#c0dd97',icon:'ti-message-dots'},
  'Follow-up needed': {bg:'#faeeda',tx:'#854f0b',bord:'#fac775',icon:'ti-bell'},
  'Meeting booked':   {bg:'#eeedfe',tx:'#3c3489',bord:'#afa9ec',icon:'ti-calendar-check'},
  'Not interested':   {bg:'#fcebeb',tx:'#791f1f',bord:'#f7c1c1',icon:'ti-x'},
};

const DEFAULT_TEMPLATE = `Dear {partner},

I hope this message finds you well. My name is {senderName}, {senderTitle} at {senderCompany} — a specialist legal recruitment firm with deep expertise placing top-tier legal talent across {city} and the wider {country} market.

We work exclusively with law firms to identify and place qualified associates, senior associates, and partners across all practice areas. Our approach is discreet, thorough, and tailored to each firm's culture and requirements.

Given {firm}'s strong reputation in {practiceArea}, I believe we may be well-positioned to support your talent acquisition needs — whether for immediate vacancies or to build a long-term hiring pipeline.

I would welcome the opportunity to speak briefly about how we might add value. Would you be open to a short introductory call at your convenience?

Warm regards,
{senderName}
{senderTitle} | {senderCompany}
{senderEmail} | {senderPhone}`;

/* ─── HELPERS ────────────────────────────────────────── */
function fillTemplate(tpl, data) {
  return tpl
    .replace(/{partner}/g,       data.partner       || '')
    .replace(/{firm}/g,          data.firm          || '')
    .replace(/{practiceArea}/g,  data.practiceArea  || '')
    .replace(/{city}/g,          data.city          || '')
    .replace(/{country}/g,       data.country       || '')
    .replace(/{senderName}/g,    data.senderName    || '[Your Name]')
    .replace(/{senderTitle}/g,   data.senderTitle   || '[Your Title]')
    .replace(/{senderCompany}/g, data.senderCompany || '[Your Company]')
    .replace(/{senderEmail}/g,   data.senderEmail   || '[Your Email]')
    .replace(/{senderPhone}/g,   data.senderPhone   || '[Your Phone]');
}

/* ─── CLAUDE API WITH WEB SEARCH ─────────────────────── */
async function searchRealFirms(country, city, practiceArea, count, apiKey, onProgress) {
  if (!apiKey) throw new Error('No API key. Click ⚙ Settings to enter your Anthropic key.');

  const practiceClause = practiceArea === 'All Practice Areas'
    ? 'across various practice areas (corporate, litigation, employment, IP, banking, real estate)'
    : `specialising in ${practiceArea}`;

  const systemPrompt = `You are a specialist legal recruitment researcher. Your job is to find REAL law firms and their actual managing partners using web search. 

Search the web to find real law firms in the specified city and country. For each firm found, search their website or LinkedIn to find:
- The firm's real name
- The actual managing partner or senior partner name  
- Their real email address (search the firm website contact/people pages, or infer the standard format like firstname.lastname@firm.com based on the firm's confirmed email pattern)
- The firm's real website URL
- Their actual practice area focus
- Firm size (Boutique / Mid-size / Large / Magic Circle / Silver Circle)
- A brief description of what the firm is known for

IMPORTANT: Only return firms that actually exist. Do not invent or fabricate any data. If you cannot confirm an email address, use the firm's general contact email or the likely pattern based on the firm's domain. Mark emails as "verified" or "inferred pattern" accordingly.

Return ONLY a valid JSON array. No markdown, no explanation, no code fences. Each object must have:
{
  "firm": "exact firm name",
  "partner": "real partner name",
  "title": "their actual title",
  "email": "email address",
  "emailConfidence": "verified" | "inferred" | "general contact",
  "website": "https://...",
  "practiceArea": "primary practice area",
  "size": "Boutique|Mid-size|Large|Magic Circle|Silver Circle",
  "description": "one factual sentence about what firm is known for",
  "source": "URL where partner info was found"
}`;

  const userPrompt = `Search the web and find ${count} real law firms ${practiceClause} based in ${city}, ${country}. 

Steps:
1. Search for "law firms ${city} ${country} ${practiceArea !== 'All Practice Areas' ? practiceArea : ''}"
2. For each firm found, visit their website to find the managing partner or senior partner
3. Look for their contact email on the website or people/team page
4. Return only verified real firms with actual people

Return the JSON array of ${count} real firms with their actual managing partners.`;

  // Call Claude API with web_search tool enabled
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4000,
      system: systemPrompt,
      tools: [
        {
          type: 'web_search_20250305',
          name: 'web_search',
          max_uses: 10,
        }
      ],
      messages: [{ role: 'user', content: userPrompt }],
    }),
  });

  const data = await response.json();
  if (!response.ok) throw new Error(data.error?.message || `API error ${response.status}`);

  // Extract all text blocks from the response (may include tool use + text)
  let jsonText = '';
  for (const block of data.content) {
    if (block.type === 'text') {
      jsonText += block.text;
    }
  }

  // Parse JSON from response
  const cleaned = jsonText.replace(/```json|```/g, '').trim();
  // Find JSON array in the text
  const arrayMatch = cleaned.match(/\[[\s\S]*\]/);
  if (!arrayMatch) throw new Error('No firm data found in response. Try a different city or practice area.');

  const arr = JSON.parse(arrayMatch[0]);
  if (!Array.isArray(arr) || arr.length === 0) throw new Error('No firms returned. Try adjusting your search.');

  return arr.map((f, i) => ({
    id: `real-${Date.now()}-${i}`,
    firm:            f.firm          || 'Unknown Firm',
    partner:         f.partner       || 'Contact Firm',
    title:           f.title         || 'Managing Partner',
    email:           f.email         || '',
    emailConfidence: f.emailConfidence || 'inferred',
    website:         f.website       || '',
    practiceArea:    f.practiceArea  || practiceArea,
    size:            f.size          || 'Mid-size',
    description:     f.description   || '',
    source:          f.source        || '',
    city, country,
    status:       'Not contacted',
    notes:        '',
    emailSentDate: null,
    selected:     false,
  }));
}

/* ─── SMALL COMPONENTS ───────────────────────────────── */
function Avatar({ name, size=36 }) {
  const letters = (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
  const cols = ['#0b2a4a','#1a4f8a','#2c6e35','#7a4a0a','#4a2a7a','#0f6e56','#8a2020','#5a3a1a'];
  return (
    <div style={{width:size,height:size,borderRadius:'50%',background:cols[(name||'A').charCodeAt(0)%cols.length],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:size*.35,fontWeight:600,flexShrink:0,fontFamily:'sans-serif'}}>
      {letters}
    </div>
  );
}

function Badge({ status }) {
  const m = STATUS_META[status] || STATUS_META['Not contacted'];
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:11,fontWeight:500,padding:'3px 9px',borderRadius:20,background:m.bg,color:m.tx,border:'0.5px solid '+m.bord,whiteSpace:'nowrap',fontFamily:'sans-serif'}}>
      <i className={'ti '+m.icon} style={{fontSize:11}}></i>{status}
    </span>
  );
}

function ConfidencePill({ level }) {
  const map = {
    'verified':        {bg:'#eaf3de',tx:'#2c6e35',bord:'#c0dd97',label:'✓ Verified'},
    'inferred':        {bg:'#faeeda',tx:'#854f0b',bord:'#fac775',label:'~ Inferred pattern'},
    'general contact': {bg:'#f1f0ec',tx:'#6b6860',bord:'#d4d1c7',label:'✉ General contact'},
  };
  const s = map[level] || map['inferred'];
  return (
    <span style={{fontSize:10,padding:'2px 7px',borderRadius:20,background:s.bg,color:s.tx,border:'0.5px solid '+s.bord,fontFamily:'sans-serif',whiteSpace:'nowrap'}}>
      {s.label}
    </span>
  );
}

function Toast({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3200); return () => clearTimeout(t); }, []);
  const bg = type==='err' ? '#8a2020' : type==='warn' ? '#7a4a0a' : '#0b2a4a';
  return (
    <div style={{position:'fixed',bottom:20,right:20,zIndex:9999,background:bg,color:'#fff',padding:'10px 18px',borderRadius:8,fontSize:13,display:'flex',alignItems:'center',gap:8,fontFamily:'sans-serif',boxShadow:'0 4px 16px rgba(0,0,0,.25)',maxWidth:360}}>
      <i className={'ti '+(type==='err'?'ti-alert-triangle':type==='warn'?'ti-bell':'ti-check')} style={{fontSize:15,flexShrink:0}}></i>{msg}
    </div>
  );
}

function SearchProgress({ steps }) {
  return (
    <div style={{background:'var(--surf)',borderRadius:R,border:'0.5px solid var(--bord)',padding:'20px 24px',maxWidth:500,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>
        <i className="ti ti-world-search spin" style={{fontSize:22,color:'var(--gold)'}}></i>
        <div>
          <div style={{fontWeight:700,fontSize:14,fontFamily:'Georgia,serif'}}>Searching the web for real law firms...</div>
          <div style={{fontSize:12,color:'var(--mut)',fontFamily:'sans-serif'}}>Claude is browsing firm websites to find managing partners</div>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {steps.map((s, i) => (
          <div key={i} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'8px 10px',background:'var(--surf2)',borderRadius:7}}>
            <i className={'ti '+(s.done?'ti-check':'ti-loader-2 pulse')} style={{fontSize:13,color:s.done?'#2c6e35':'var(--gold)',flexShrink:0,marginTop:1}}></i>
            <span style={{fontSize:12,fontFamily:'sans-serif',color:'var(--tx)',lineHeight:1.4}}>{s.text}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── MAIN APP ───────────────────────────────────────── */
function App() {
  const [tab,          setTab]          = useState('search');
  const [params,       setParams]       = useState({country:'SG', city:'Singapore', practiceArea:'All Practice Areas', count:8});
  const [firms,        setFirms]        = useState([]);
  const [loading,      setLoading]      = useState(false);
  const [searchSteps,  setSearchSteps]  = useState([]);
  const [sender,       setSender]       = useState({name:'',title:'',company:'',email:'',phone:''});
  const [template,     setTemplate]     = useState(DEFAULT_TEMPLATE);
  const [tracker,      setTracker]      = useState([]);
  const [toast,        setToast]        = useState(null);
  const [previewModal, setPreviewModal] = useState(null);
  const [notesModal,   setNotesModal]   = useState(null);
  const [filterStatus, setFilterStatus] = useState('All');
  const [searchQ,      setSearchQ]      = useState('');
  const [sendingAll,   setSendingAll]   = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [apiKeyInput,  setApiKeyInput]  = useState(() => { try { return localStorage.getItem('lr_api_key')||''; } catch(e) { return ''; } });

  const showToast  = (msg, type='ok') => setToast({msg, type});
  const apiKey     = apiKeyInput;
  const countryObj = COUNTRIES.find(c => c.code===params.country) || COUNTRIES[0];

  const saveKey = () => {
    try { localStorage.setItem('lr_api_key', apiKeyInput); } catch(e) {}
    showToast('API key saved');
    setShowSettings(false);
  };

  const doSearch = async () => {
    if (!apiKey) { showToast('Enter your Anthropic API key in Settings','err'); setShowSettings(true); return; }
    setLoading(true);
    setFirms([]);
    setSearchSteps([
      {text: `Searching for law firms in ${params.city}, ${countryObj.name}...`, done: false},
      {text: 'Visiting firm websites to find managing partners...', done: false},
      {text: 'Extracting contact details and email addresses...', done: false},
      {text: 'Compiling verified results...', done: false},
    ]);

    // Animate steps as search progresses
    const stepTimers = [1800, 4000, 7000, 10000].map((delay, i) =>
      setTimeout(() => setSearchSteps(prev => prev.map((s, j) => j===i ? {...s, done:true} : s)), delay)
    );

    try {
      const results = await searchRealFirms(
        countryObj.name, params.city, params.practiceArea, params.count, apiKey,
        (msg) => setSearchSteps(prev => [...prev, {text: msg, done: false}])
      );
      stepTimers.forEach(t => clearTimeout(t));
      setSearchSteps(prev => prev.map(s => ({...s, done:true})));
      setTimeout(() => {
        setFirms(results);
        setTab('results');
        setLoading(false);
        showToast(`Found ${results.length} real firms`);
      }, 500);
    } catch (e) {
      stepTimers.forEach(t => clearTimeout(t));
      setLoading(false);
      showToast(e.message, 'err');
    }
  };

  const toggleSelect = id  => setFirms(p => p.map(f => f.id===id ? {...f, selected:!f.selected} : f));
  const toggleAll    = ()  => { const any = firms.some(f=>f.selected); setFirms(p => p.map(f => ({...f, selected:!any}))); };
  const selected     = firms.filter(f => f.selected);

  const previewEmail = firm => fillTemplate(template, {
    ...firm,
    senderName:    sender.name,
    senderTitle:   sender.title,
    senderCompany: sender.company,
    senderEmail:   sender.email,
    senderPhone:   sender.phone,
  });

  const markSent = useCallback(ids => {
    const now = new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
    setFirms(p => p.map(f => ids.includes(f.id) ? {...f, status:'Email sent', emailSentDate:now, selected:false} : f));
    const entries = firms.filter(f => ids.includes(f.id)).map(f => ({...f, status:'Email sent', emailSentDate:now}));
    setTracker(p => {
      const updated = p.map(e => entries.find(n=>n.id===e.id) || e);
      const fresh   = entries.filter(n => !p.find(e=>e.id===n.id));
      return [...updated, ...fresh];
    });
    showToast(entries.length + ' email' + (entries.length!==1?'s':'') + ' marked as sent');
    setTab('tracker');
  }, [firms]);

  const sendAll = () => {
    setSendingAll(true);
    setTimeout(() => { markSent(selected.map(f=>f.id)); setSendingAll(false); }, 400);
  };

  const updateField = (id, field, val) => {
    setTracker(p => p.map(e => e.id===id ? {...e, [field]:val} : e));
    setFirms(p   => p.map(f => f.id===id ? {...f, [field]:val} : f));
  };

  const filteredTracker = tracker.filter(f => {
    const ms = filterStatus==='All' || f.status===filterStatus;
    const mq = !searchQ || [f.firm,f.partner,f.email,f.city].some(v => (v||'').toLowerCase().includes(searchQ.toLowerCase()));
    return ms && mq;
  });

  const stats = {
    total:    tracker.length,
    sent:     tracker.filter(f => f.status==='Email sent').length,
    replied:  tracker.filter(f => f.status==='Replied').length,
    meetings: tracker.filter(f => f.status==='Meeting booked').length,
  };

  const NAV = [
    ['search',  'ti-telescope',       'Search'],
    ['results', 'ti-list-details',    'Firms'],
    ['compose', 'ti-mail-forward',    'Compose'],
    ['tracker', 'ti-layout-dashboard','Tracker'],
  ];

  return (
    <div style={{minHeight:'100vh', background:'var(--surf2)'}}>

      {/* ── HEADER ── */}
      <div style={{background:'var(--navy)',padding:'12px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:34,height:34,borderRadius:8,background:'var(--gold)',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <i className="ti ti-scale" style={{color:'#fff',fontSize:19}}></i>
          </div>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:15,fontFamily:'Georgia,serif'}}>LexReach</div>
            <div style={{color:'rgba(255,255,255,0.4)',fontSize:10,fontFamily:'sans-serif'}}>Legal Recruitment Business Development</div>
          </div>
        </div>
        <div style={{display:'flex',gap:2,alignItems:'center'}}>
          {NAV.map(([v,ic,lb]) => (
            <button key={v} onClick={() => setTab(v)} style={{background:tab===v?'rgba(255,255,255,0.14)':'transparent',border:'none',color:tab===v?'#fff':'rgba(255,255,255,0.5)',padding:'6px 12px',borderRadius:6,cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',gap:5,fontFamily:'sans-serif'}}>
              <i className={'ti '+ic} style={{fontSize:15}}></i>{lb}
            </button>
          ))}
          <div style={{width:1,background:'rgba(255,255,255,0.15)',height:20,margin:'0 4px'}}></div>
          <button onClick={() => setShowSettings(true)} style={{background:apiKey?'transparent':'rgba(200,80,80,0.25)',border:apiKey?'none':'0.5px solid rgba(200,80,80,0.5)',color:apiKey?'rgba(255,255,255,0.5)':'#ff9999',padding:'6px 10px',borderRadius:6,cursor:'pointer',fontFamily:'sans-serif',display:'flex',alignItems:'center',gap:4,fontSize:12}}>
            <i className="ti ti-settings" style={{fontSize:15}}></i>{!apiKey && <span style={{fontSize:11}}>Set API key</span>}
          </button>
        </div>
      </div>

      {toast && <Toast msg={toast.msg} type={toast.type} onDone={() => setToast(null)} />}

      <div style={{maxWidth:960,margin:'0 auto',padding:'22px 16px'}}>

        {/* ── SEARCH TAB ── */}
        {tab==='search' && (
          <div className="fade-in">
            <div style={{textAlign:'center',marginBottom:28}}>
              <div style={{fontSize:26,fontWeight:700,fontFamily:'Georgia,serif',marginBottom:6}}>Find real law firm contacts</div>
              <div style={{fontSize:14,color:'var(--mut)',fontFamily:'sans-serif',marginBottom:8}}>
                Claude searches live law firm websites to find actual managing partners and their contact details
              </div>
              <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 12px',borderRadius:20,background:'#eaf3de',border:'0.5px solid #c0dd97'}}>
                <i className="ti ti-world-search" style={{fontSize:13,color:'#2c6e35'}}></i>
                <span style={{fontSize:11,color:'#2c6e35',fontFamily:'sans-serif'}}>Powered by live web search — real firms, real people, real contacts</span>
              </div>
              {!apiKey && (
                <div onClick={() => setShowSettings(true)} style={{display:'flex',alignItems:'center',gap:7,padding:'8px 14px',borderRadius:8,background:'#fcebeb',border:'0.5px solid #f7c1c1',cursor:'pointer',marginTop:12,maxWidth:400,margin:'12px auto 0',justifyContent:'center'}}>
                  <i className="ti ti-alert-triangle" style={{fontSize:14,color:'#8a2020'}}></i>
                  <span style={{fontSize:12,color:'#8a2020',fontFamily:'sans-serif'}}>Anthropic API key required — click to set</span>
                </div>
              )}
            </div>

            {loading ? (
              <SearchProgress steps={searchSteps} />
            ) : (
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,maxWidth:720,margin:'0 auto'}}>

                {/* Search params */}
                <div style={{background:'var(--surf)',borderRadius:R,border:'0.5px solid var(--bord)',padding:24,gridColumn:'1/-1'}}>

      {previewModal && (
        <div onClick={() => setPreviewModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}}>
          <div onClick={e => e.stopPropagation()} style={{background:'var(--surf)',borderRadius:R,maxWidth:620,width:'100%',maxHeight:'88vh',overflow:'auto'}}>
            <div style={{padding:'16px 20px',borderBottom:'0.5px solid var(--bord)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontWeight:700,fontSize:14,fontFamily:'Georgia,serif'}}>{previewModal.firm}</div>
                <div style={{fontSize:11,color:'var(--mut)',fontFamily:'sans-serif',display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                  <span>To: {previewModal.partner} &lt;{previewModal.email||'email not found'}&gt;</span>
                  {previewModal.email && <ConfidencePill level={previewModal.emailConfidence} />}
                </div>
              </div>
              <button onClick={() => setPreviewModal(null)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:22,color:'var(--mut)',lineHeight:1}}>×</button>
            </div>
            <div style={{padding:'18px 20px'}}>
              <div style={{fontFamily:'Georgia,serif',fontSize:13,lineHeight:1.85,whiteSpace:'pre-wrap',color:'var(--tx)'}}>{previewEmail(previewModal)}</div>
            </div>
            <div style={{padding:'12px 20px',borderTop:'0.5px solid var(--bord)',display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={() => setPreviewModal(null)} style={{padding:'7px 13px',borderRadius:7,border:'0.5px solid var(--bord)',background:'transparent',cursor:'pointer',fontSize:12,fontFamily:'sans-serif',color:'var(--tx)'}}>Close</button>
              <button onClick={() => { markSent([previewModal.id]); setPreviewModal(null); }} style={{padding:'7px 14px',borderRadius:7,border:'none',background:'var(--navy)',color:'#fff',cursor:'pointer',fontSize:12,fontWeight:500,fontFamily:'sans-serif',display:'flex',alignItems:'center',gap:5}}>
                <i className="ti ti-check"></i>Mark as sent
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── NOTES MODAL ── */}
      {notesModal && (
        <div onClick={() => setNotesModal(null)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,padding:16}}>
          <div onClick={e => e.stopPropagation()} style={{background:'var(--surf)',borderRadius:R,maxWidth:440,width:'100%'}}>
            <div style={{padding:'16px 20px',borderBottom:'0.5px solid var(--bord)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{fontWeight:700,fontSize:14,fontFamily:'Georgia,serif'}}>Notes — {notesModal.firm}</div>
              <button onClick={() => setNotesModal(null)} style={{background:'transparent',border:'none',cursor:'pointer',fontSize:22,color:'var(--mut)'}}>×</button>
            </div>
            <div style={{padding:'16px 20px'}}>
              <textarea id="notesTxt" defaultValue={notesModal.notes} placeholder="Record conversation details, follow-up actions, contact notes..." style={{width:'100%',height:150,padding:'10px',borderRadius:7,border:'0.5px solid var(--bord)',fontSize:12,lineHeight:1.65,resize:'vertical',fontFamily:'Georgia,serif',background:'var(--surf)',color:'var(--tx)'}} />
            </div>
            <div style={{padding:'10px 20px',borderTop:'0.5px solid var(--bord)',display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button onClick={() => setNotesModal(null)} style={{padding:'7px 12px',borderRadius:7,border:'0.5px solid var(--bord)',background:'transparent',cursor:'pointer',fontSize:12,fontFamily:'sans-serif',color:'var(--tx)'}}>Cancel</button>
              <button onClick={() => { updateField(notesModal.id,'notes',document.getElementById('notesTxt').value); setNotesModal(null); showToast('Notes saved'); }} style={{padding:'7px 14px',borderRadius:7,border:'none',background:'var(--navy)',color:'#fff',cursor:'pointer',fontSize:12,fontWeight:500,fontFamily:'sans-serif'}}>Save</button>
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
